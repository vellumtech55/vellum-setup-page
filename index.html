<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vellum Setup Page</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #111;
        color: white;

        /* 🔥 makes footer stick to bottom */
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    header {
        background-color: #000;
        color: white;
        text-align: center;
        padding: 0.6rem;
    }

    nav {
        display: flex;
        background-color: #000;
        border-bottom: 2px solid #222;
    }

    nav button {
        flex: 1;
        cursor: pointer;
        border: none;
        background-color: #000;
        color: white;
        font-size: 1rem;
        transition: 0.3s;
    }

    nav button:hover {
        background-color: #222;
    }

    nav button.active {
        background-color: #222;
        border-bottom: 2px solid #900;
    }

    .tab-content {
        display: none;
        padding: 2rem;
        max-width: 900px;
        margin: auto;
        flex: 1;
        animation: fadeIn 0.3s ease-in;
    }

    .tab-content.active {
        display: block;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    footer {
        background-color: #000;
        color: #aaa;
        text-align: center;
        padding: 1rem;
    }

    button {
        margin: 5px;
        padding: 10px;
        background: #222;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>
</head>

<body>

<header>
    <h1>Vellum Setup Page</h1>
</header>

<nav>
    <button class="tab-button active" data-tab="about">Page Information</button>
    <button class="tab-button" data-tab="products">Products</button>
</nav>

<!-- ABOUT -->
<section id="about" class="tab-content active">
    <h2>Page Information</h2>
    <p>
        This page is made to show what is REQUIRED for the products of Vellum Studio to run before purchase.
        For questions about products, requirements, prices, or legal info go to the main Vellum Studio page.
    </p>
</section>

<!-- PRODUCTS -->
<section id="products" class="tab-content">

    <h2>Products</h2>

    <select id="actionSelector" onchange="toggleButtons()">
        <option value="">Select a product type</option>

        <optgroup label="Software Type">
            <option value="utility">Utility Software</option>
            <option value="gaming">Gaming Software</option>
        </optgroup>
    </select>

    <br><br>

    <div id="buttonArea"></div>
    <div id="TextArea"></div>

</section>

<footer>
    <p>&copy; 2026 Vellum Studio. All rights reserved.</p>
</footer>

<script>
const tabButtons = document.querySelectorAll('.tab-button');
const tabContents = document.querySelectorAll('.tab-content');

tabButtons.forEach(button => {
    button.addEventListener('click', () => {
        const tab = button.dataset.tab;

        tabButtons.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));

        button.classList.add('active');
        document.getElementById(tab).classList.add('active');
    });
});

function toggleButtons() {
    const selection = document.getElementById("actionSelector").value;
    const buttonArea = document.getElementById("buttonArea");

    buttonArea.innerHTML = "";

    if (selection === "utility") {
        buttonArea.innerHTML = `
            <button onclick="showText('Timer requires Windows 10/11 and Python installed and.')">
                Timer
            </button>

            <button onclick="showText('Screen recorder requires Python 3.8+, opencv-python, numpy, and mss installed. DOES NOT WORK ON WAYLAND IF USING LINUX.')">
                Screen Recorder
            </button>
            <button onclick="showText('python')">
                Work Tracker
            </button>
        `;
    }

    else if (selection === "gaming") {
        buttonArea.innerHTML = `
            <button onclick="showText('Match review requires Ollama with Mistral and qwen2.5 model installed and python.')">
                Vellum Game Visualization
            </button>
        `;
    }
}

function showText(message) {
    document.getElementById("TextArea").innerHTML = `
        <div style="
            margin-top:20px;
            padding:16px;
            background:#1a1a1a;
            border:1px solid #333;
            border-radius:12px;
            color:white;
        ">
            ${message}
        </div>
    `;
}
</script>

</body>
</html>
