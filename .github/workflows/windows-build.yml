name: Build Windows EXE
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pipreqs

          if (Test-Path requirements.txt) {
              Write-Host "Using existing requirements.txt"
              pip install -r requirements.txt
          } else {
              Write-Host "No requirements.txt found - scanning source with pipreqs"
              pipreqs . --force --savepath generated-requirements.txt
              Write-Host "Detected packages:"
              Get-Content generated-requirements.txt
              pip install -r generated-requirements.txt
          }

          # Safety net in case pipreqs misses dynamically-loaded packages
          pip install customtkinter pillow keyboard pyautogui requests

      - name: Find main.py
        shell: powershell
        run: |
          $main = Get-ChildItem -Recurse -Filter main.py | Select-Object -First 1
          if ($null -eq $main) {
              Write-Error "No main.py found!"
              exit 1
          }
          echo "MAIN_FILE=$($main.FullName)" >> $env:GITHUB_ENV
          Write-Host "Found: $($main.FullName)"

      - name: Build EXE
        shell: powershell
        run: |
          $pyArgs = @("--onefile", "--windowed")

          # Always collect these fully - they hide assets/binaries that
          # PyInstaller's static analysis often misses (icons, DLLs, native backends)
          $alwaysCollect = @("customtkinter", "PIL", "keyboard", "pyautogui")
          foreach ($pkg in $alwaysCollect) {
              $pyArgs += "--collect-all"
              $pyArgs += $pkg
          }

          # Pick whichever requirements file exists and collect-all everything in it
          $reqFile = if (Test-Path requirements.txt) { "requirements.txt" } else { "generated-requirements.txt" }

          if (Test-Path $reqFile) {
              Get-Content $reqFile | ForEach-Object {
                  $line = $_.Trim()
                  if ($line -and -not $line.StartsWith("#")) {
                      # strip version specifiers like ==, >=, <=, ~=, !=
                      $pkg = ($line -split "[=<>~!]")[0].Trim()
                      if ($pkg -and ($alwaysCollect -notcontains $pkg)) {
                          $pyArgs += "--collect-all"
                          $pyArgs += $pkg
                      }
                  }
              }
          }

          # Hidden imports for your own internal modules
          # (add more here if your project has other local modules PyInstaller can't detect)
          $hiddenImports = @("launcher", "core")
          foreach ($mod in $hiddenImports) {
              $pyArgs += "--hidden-import"
              $pyArgs += $mod
          }

          $pyArgs += $env:MAIN_FILE

          Write-Host "PyInstaller args:"
          $pyArgs | ForEach-Object { Write-Host "  $_" }

          # Use splatting (@pyArgs), NOT Invoke-Expression on a joined string -
          # splatting preserves each argument exactly, including paths with spaces
          & pyinstaller @pyArgs

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/*
